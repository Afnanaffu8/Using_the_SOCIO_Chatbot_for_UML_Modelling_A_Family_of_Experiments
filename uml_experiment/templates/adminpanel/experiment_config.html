{% extends 'base.html' %}

{% block title %}Experiment Configuration{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h2><i class="fas fa-cog me-2"></i>Experiment Configuration</h2>
        <p class="text-muted">Configure experimental settings and parameters</p>
    </div>
</div>

<div class="row">
    <div class="col-md-6 mb-4">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="fas fa-users-cog me-2"></i>Participant Settings</h5>
            </div>
            <div class="card-body">
                <form>
                    <div class="mb-3">
                        <label class="form-label">Random Assignment</label>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="randomAssignment" checked>
                            <label class="form-check-label" for="randomAssignment">
                                Randomly assign tool types to participants
                            </label>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Balanced Distribution</label>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="balancedDist" checked>
                            <label class="form-check-label" for="balancedDist">
                                Ensure equal number of participants per tool
                            </label>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="maxTasks" class="form-label">Max Tasks per Participant</label>
                        <input type="number" class="form-control" id="maxTasks" value="5" min="1" max="10">
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-2"></i>Save Settings
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="col-md-6 mb-4">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0"><i class="fas fa-tasks me-2"></i>Task Settings</h5>
            </div>
            <div class="card-body">
                <form>
                    <div class="mb-3">
                        <label for="defaultTimeLimit" class="form-label">Default Time Limit (minutes)</label>
                        <input type="number" class="form-control" id="defaultTimeLimit" value="30" min="10" max="120">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Auto-Evaluation</label>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="autoEval">
                            <label class="form-check-label" for="autoEval">
                                Enable automatic diagram evaluation
                            </label>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Allow Revisions</label>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="allowRevisions">
                            <label class="form-check-label" for="allowRevisions">
                                Allow participants to revise submissions
                            </label>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-save me-2"></i>Save Settings
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header bg-info text-white">
                <h5 class="mb-0"><i class="fas fa-database me-2"></i>Data Management</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <button class="btn btn-outline-primary w-100">
                            <i class="fas fa-download me-2"></i>Export All Data
                        </button>
                    </div>
                    <div class="col-md-4 mb-3">
                        <button class="btn btn-outline-warning w-100">
                            <i class="fas fa-file-excel me-2"></i>Export to CSV
                        </button>
                    </div>
                    <div class="col-md-4 mb-3">
                        <button class="btn btn-outline-danger w-100" onclick="return confirm('This will delete all experimental data. Are you sure?')">
                            <i class="fas fa-trash me-2"></i>Reset Experiment
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
