{% extends 'base.html' %}

{% block title %}Add Task{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0"><i class="fas fa-plus me-2"></i>Create New Task</h4>
            </div>
            <div class="card-body">
                <form method="post" class="needs-validation" novalidate>
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="title" class="form-label">Task Title *</label>
                        <input type="text" class="form-control" id="title" name="title" 
                               placeholder="e.g., Library Management System" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label">Description *</label>
                        <textarea class="form-control" id="description" name="description" rows="3" 
                                  placeholder="Brief description of the task" required></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="requirements" class="form-label">Requirements *</label>
                        <textarea class="form-control" id="requirements" name="requirements" rows="6" 
                                  placeholder="Detailed requirements for the UML diagram..." required></textarea>
                        <div class="form-text">Provide clear instructions on what classes and relationships should be included</div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="tool_type" class="form-label">Tool Type *</label>
                            <select class="form-select" id="tool_type" name="tool_type" required>
                                <option value="">Select...</option>
                                <option value="chatbot">Chatbot</option>
                                <option value="graphical">Graphical Tool</option>
                            </select>
                        </div>
                        
                        <div class="col-md-4 mb-3">
                            <label for="difficulty" class="form-label">Difficulty *</label>
                            <select class="form-select" id="difficulty" name="difficulty" required>
                                <option value="">Select...</option>
                                <option value="easy">Easy</option>
                                <option value="medium">Medium</option>
                                <option value="hard">Hard</option>
                            </select>
                        </div>
                        
                        <div class="col-md-4 mb-3">
                            <label for="time_limit" class="form-label">Time Limit (minutes) *</label>
                            <input type="number" class="form-control" id="time_limit" name="time_limit" 
                                   value="30" min="10" max="120" required>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="expected_classes" class="form-label">Expected Number of Classes *</label>
                            <input type="number" class="form-control" id="expected_classes" name="expected_classes" 
                                   min="1" max="20" required>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="expected_relationships" class="form-label">Expected Number of Relationships *</label>
                            <input type="number" class="form-control" id="expected_relationships" name="expected_relationships" 
                                   min="1" max="30" required>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'adminpanel:task_list' %}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left me-2"></i>Cancel
                        </a>
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save me-2"></i>Create Task
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
