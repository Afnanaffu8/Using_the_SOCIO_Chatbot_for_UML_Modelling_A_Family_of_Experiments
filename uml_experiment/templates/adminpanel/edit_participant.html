{% extends 'base.html' %}

{% block title %}Edit Participant{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0"><i class="fas fa-user-edit me-2"></i>Edit Participant: {{ participant.username }}</h4>
            </div>
            <div class="card-body">
                <form method="post" class="needs-validation" novalidate>
                    {% csrf_token %}
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" value="{{ participant.username }}" disabled>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Email *</label>
                            <input type="email" class="form-control" id="email" name="email" 
                                   value="{{ participant.email }}" required>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="age" class="form-label">Age</label>
                            <input type="number" class="form-control" id="age" name="age" 
                                   value="{{ participant.age }}" min="18" max="100">
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="education_level" class="form-label">Education Level</label>
                            <select class="form-select" id="education_level" name="education_level">
                                <option value="">Select...</option>
                                <option value="Bachelor's" {% if participant.education_level == "Bachelor's" %}selected{% endif %}>Bachelor's Degree</option>
                                <option value="Master's" {% if participant.education_level == "Master's" %}selected{% endif %}>Master's Degree</option>
                                <option value="PhD" {% if participant.education_level == "PhD" %}selected{% endif %}>PhD</option>
                                <option value="Other" {% if participant.education_level == "Other" %}selected{% endif %}>Other</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="uml_experience" class="form-label">UML Experience</label>
                        <select class="form-select" id="uml_experience" name="uml_experience">
                            <option value="">Select...</option>
                            <option value="Beginner" {% if participant.uml_experience == "Beginner" %}selected{% endif %}>Beginner (0-1 year)</option>
                            <option value="Intermediate" {% if participant.uml_experience == "Intermediate" %}selected{% endif %}>Intermediate (1-3 years)</option>
                            <option value="Advanced" {% if participant.uml_experience == "Advanced" %}selected{% endif %}>Advanced (3+ years)</option>
                        </select>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'adminpanel:participant_list' %}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left me-2"></i>Cancel
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i>Update Participant
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
